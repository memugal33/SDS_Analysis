name: gee_env
channels:
  - conda-forge
  - defaults
dependencies:
  # ── Core Python ─────────────────────────────────────────────────────────────
  - python=3.14

  # ── Google Earth Engine ─────────────────────────────────────────────────────
  - earthengine-api=1.7.22    # GEE Python client
  - geemap=0.37.1             # interactive GEE maps in Jupyter

  # ── Jupyter / notebook support ──────────────────────────────────────────────
  - ipykernel=7.2.0
  - ipywidgets=8.1.8
  - ipyleaflet=0.20.0
  - ipython=9.12.0
  - jupyter_client=8.8.0
  - jupyter_core=5.9.1
  - jupyterlab_widgets=3.0.16

  # ── Data / numerics ─────────────────────────────────────────────────────────
  - numpy=2.4.3
  - pandas=3.0.2

  # ── Visualisation ───────────────────────────────────────────────────────────
  - matplotlib-base=3.10.8
  - folium=0.20.0
  - plotly=6.6.0
  - branca=0.8.2

  # ── Networking / auth ────────────────────────────────────────────────────────
  - requests=2.33.1
  - google-auth=2.49.2
  - google-api-python-client=2.194.0
  - google-cloud-storage=3.10.1

  # ── Utilities ────────────────────────────────────────────────────────────────
  - tqdm=4.67.3
  - pillow=12.2.0
  - beautifulsoup4=4.14.3
  - gdown=6.0.0
